services:
  # ── Neo4j Knowledge Graph ──────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: legal_neo4j
    ports:
      - "7474:7474"    # Browser UI
      - "7687:7687"    # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      # Permite el export del grafo a archivo (Tier 4 de backup_to_wasabi.sh).
      NEO4J_apoc_export_file_enabled: 'true'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  # ── Qdrant Vector Store ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: legal_qdrant
    ports:
      - "6333:6333"    # REST API
      - "6334:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── FastAPI Backend ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: scrapper-leyes-app
    container_name: legal_api
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/app/data
      - NEO4J_URI=bolt://neo4j:7687
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data
      - ./src:/app/src          # código editable montado → sin rebuild en dev
    command: ["uvicorn", "scrapper_leyes.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      - neo4j
      - qdrant
    restart: unless-stopped

  # ── Pipeline CLI (catalog sync / scrape / export) ──────────────────────
  # Not started by `up` (profile "cli"); run on demand:
  #   docker compose run --rm pipeline catalog sync --dataset cc_sentencias
  #   docker compose run --rm pipeline export vector
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_INGEST: "true"   # incluye docling (HTML/PDF→Markdown) para scrape/reparse
    image: scrapper-leyes-ingest
    container_name: legal_pipeline
    profiles: ["cli"]
    environment:
      - DATA_DIR=/app/data
      - NEO4J_URI=bolt://neo4j:7687
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data
      - ./src:/app/src          # código editable montado → sin rebuild en dev
    depends_on:
      - neo4j
      - qdrant
    entrypoint: ["scrapper-leyes"]

  # ── React/Vite Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legal_frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── Servidor MCP (tools para LLMs) ─────────────────────────────────────
  # Arrancar con: docker compose --profile mcp up -d mcp
  # (requiere imagen reconstruida tras añadir 'mcp' a dependencies)
  mcp:
    image: scrapper-leyes-app
    container_name: legal_mcp
    profiles: ["mcp"]
    environment:
      - DATA_DIR=/app/data
      - NEO4J_URI=bolt://neo4j:7687
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    command: ["scrapper-leyes", "mcp", "--transport", "sse", "--host", "0.0.0.0", "--port", "8765"]
    ports:
      - "8765:8765"
    depends_on:
      - neo4j
      - qdrant
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
